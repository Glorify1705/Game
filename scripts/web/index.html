<!doctype html>
<!-- Development shell for testing web engine builds locally. The shipped
     shell is generated by `game package --target web`; keep the preRun
     logic here in sync with it. Serve a directory containing game.js,
     game.wasm, assets.sqlite3, and assets.zip over HTTP. -->
<html>
<head>
  <meta charset="utf-8">
  <title>game (dev shell)</title>
  <style>
    html, body { margin: 0; padding: 0; background: #111; height: 100%; }
    #canvas { display: block; touch-action: none; user-select: none; margin: 0 auto; outline: none; }
    #status { color: #ccc; font: 14px monospace; padding: 8px; }
  </style>
</head>
<body>
  <div id="status">Loading…</div>
  <canvas id="canvas" tabindex="0" oncontextmenu="event.preventDefault()"></canvas>
  <pre id="log" style="color:#888; font-size:10px; max-height:30vh; overflow:auto;"></pre>
  <script>
    var Module = {
      canvas: document.getElementById('canvas'),
      // Lets canvas.toDataURL capture frames for the snapshot below.
      webglContextAttributes: { preserveDrawingBuffer: true },
      preRun: [function() {
        var FS = Module.FS;
        FS.mkdir('/game');
        ['assets.sqlite3', 'assets.zip'].forEach(function(name) {
          // Registers a run dependency; main() starts once all fetches land.
          FS.createPreloadedFile('/game', name, name, /*canRead=*/true,
                                 /*canWrite=*/true);
        });
        FS.mkdir('/save');
        FS.mount(IDBFS, {}, '/save');
        Module.addRunDependency('idbfs');
        FS.syncfs(/*populate=*/true, function(err) {
          if (err) console.warn('IDBFS load failed:', err);
          Module.removeRunDependency('idbfs');
        });
      }],
      postRun: [function() {
        document.getElementById('status').style.display = 'none';
        var canvas = document.getElementById('canvas');
        canvas.focus();
        // Post a rendered frame back to the dev server for headless
        // verification (serve.py stores it as shot.png).
        var rafTicks = 0;
        function tick() { rafTicks++; requestAnimationFrame(tick); }
        requestAnimationFrame(tick);
        setTimeout(function() {
          // Capture inside rAF, after the game's callback rendered this
          // frame and before the next clear: readPixels sees the frame.
          requestAnimationFrame(function() {
            var gl = canvas.getContext('webgl2');
            var w = gl.drawingBufferWidth, h = gl.drawingBufferHeight;
            var px = new Uint8Array(w * h * 4);
            gl.readPixels(0, 0, w, h, gl.RGBA, gl.UNSIGNED_BYTE, px);
            var c2 = document.createElement('canvas');
            c2.width = w; c2.height = h;
            var ctx2 = c2.getContext('2d');
            var img = ctx2.createImageData(w, h);
            for (var y = 0; y < h; y++) {  // flip Y
              img.data.set(px.subarray((h - 1 - y) * w * 4, (h - y) * w * 4),
                           y * w * 4);
            }
            ctx2.putImageData(img, 0, 0);
            fetch('/shot', { method: 'POST', body: c2.toDataURL('image/png') });
            var lit = 0;
            for (var i = 0; i < px.length; i += 4) {
              if (px[i] + px[i+1] + px[i+2] > 30) lit++;
            }
            logToDom('DIAG litPixels=' + lit + '/' + (w*h));
          });
          logToDom('DIAG rafTicks=' + rafTicks +
                   ' glError=' + (Module.GLctx ? Module.GLctx.getError() : 'n/a') +
                   ' dbw=' + (Module.GLctx ? Module.GLctx.drawingBufferWidth : 0) +
                   ' dbh=' + (Module.GLctx ? Module.GLctx.drawingBufferHeight : 0) +
                   ' canvas=' + canvas.width + 'x' + canvas.height);
          fetch('/shot', { method: 'POST', body: canvas.toDataURL('image/png') });
        }, 8000);
      }],
      print: function(text) { console.log(text); logToDom(text); },
      printErr: function(text) { console.error(text); logToDom(text); }
    };
    // Mirror engine output into the DOM so headless browsers can assert on
    // boot progress via --dump-dom.
    function logToDom(text) {
      var el = document.getElementById('log');
      el.textContent += text + '\n';
      // Also report to the dev server so headless test runs can assert on
      // boot progress (serve.py collects these in boot.log).
      try { navigator.sendBeacon('/log', text); } catch (e) {}
    }
    window.addEventListener('error', function(e) {
      logToDom('PAGE ERROR: ' + e.message);
    });
  </script>
  <script src="game.js"></script>
</body>
</html>
